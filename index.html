<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Running Leaderboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e5e5e5;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;overflow-x:hidden}
.container{max-width:800px;margin:0 auto;padding:20px 16px 40px}

/* Stat Cards */
.stats-row{display:flex;gap:8px;margin-bottom:20px;width:100%}
.stat-card{background:linear-gradient(135deg,#1e1e2e,#2a2a3e);border-radius:12px;padding:10px;flex:1 1 0%;min-width:0;overflow:hidden}
.stat-label{color:#6b7280;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px;white-space:nowrap}
.stat-value{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-sub{color:#555;font-size:10px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Table */
.section-title{font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.table-wrap{background:#1a1a2a;border-radius:14px;border:1px solid #252535;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px;text-align:left;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;border-bottom:2px solid #333}
td{padding:10px;white-space:nowrap}
tr.data-row{border-bottom:1px solid #252535;transition:background .15s}
tr.data-row:last-child{border-bottom:none}
tr.data-row:hover{background:#222235}
.empty-state{text-align:center;padding:48px 20px;color:#555}

/* Prize Rules */
.rules-panel{background:#1a1a2a;border-radius:12px;border:1px solid #333;margin-top:24px;overflow:hidden}
.rules-toggle{width:100%;padding:14px 20px;background:none;border:none;color:#ccc;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
.rules-body{padding:0 16px 16px;font-size:13px;color:#9ca3af;line-height:1.6}
.streak-box{margin-bottom:16px;padding:10px 14px;background:#0f0f1a;border-radius:8px;border:1px solid #252535}
.streak-box-title{color:#FC4C02;font-weight:600;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.prize-table{width:100%;font-size:12px;border-collapse:collapse;border:1px solid #333}
.prize-table th{padding:8px 12px;font-weight:700;border-bottom:1px solid #333;border-right:1px solid #333;background:#0f0f1a}
.prize-table th:last-child{border-right:none}
.prize-table td{padding:8px 12px;border-bottom:1px solid #252535;border-right:1px solid #252535}
.prize-table td:last-child{border-right:none}
.prize-table tr:last-child td{border-bottom:none}

.footer{text-align:center;margin-top:24px;padding:16px 0;color:#333;font-size:12px}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
// ============================================================
// RUNS DATA — Add new runs here
// ============================================================
const RUNS = [
  { id: 1, date: "2026-04-07", time: "18:24", distance: 3.55, pace: "6:07", duration: "21m 46s" },
];

// ============================================================
// STREAK & PRIZE CALCULATION
// ============================================================
function calculateStreaks(runs) {
  if (!runs.length) return [];
  const sorted = [...runs].sort((a, b) =>
    new Date(a.date + "T" + (a.time || "00:00")) - new Date(b.date + "T" + (b.time || "00:00"))
  );
  const result = [];
  let streak = 1;
  for (let i = 0; i < sorted.length; i++) {
    if (i === 0) { streak = 1; }
    else {
      const gap = Math.round((new Date(sorted[i].date) - new Date(sorted[i-1].date)) / 864e5);
      if (gap <= 1) streak += 1;
      else if (gap === 2) streak = Math.max(streak - 1, 1);
      else streak = 1;
    }
    result.push({ ...sorted[i], streak });
  }
  return result;
}

function calculatePrize(dist, streak) {
  if (dist < 3.5) return 0;
  let base = streak > 10 ? 700 : streak > 5 ? 500 : streak > 2 ? 350 : 0;
  if (!base) return 0;
  if (dist > 10) return base * 3;
  if (dist > 5) return base * 2;
  return base;
}

function streakColor(s) { return s > 10 ? "#f59e0b" : s > 5 ? "#f97316" : s > 2 ? "#ef4444" : "#6b7280"; }
function streakEmoji(s) { return s > 10 ? "\u{1F525}\u{1F525}\u{1F525}" : s > 5 ? "\u{1F525}\u{1F525}" : s > 2 ? "\u{1F525}" : ""; }
function fmtDate(d) { const dt = new Date(d + "T00:00:00"); return dt.getDate() + " " + dt.toLocaleDateString("en-IN", { month: "short" }); }

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById("app");
  const streaks = calculateStreaks(RUNS);
  const reversed = [...streaks].reverse();
  const current = streaks.length ? streaks[streaks.length - 1].streak : 0;
  const totalDist = RUNS.reduce((s, r) => s + r.distance, 0);
  const totalPrize = streaks.reduce((s, r) => s + calculatePrize(r.distance, r.streak), 0);
  const best = streaks.reduce((m, r) => Math.max(m, r.streak), 0);

  let rulesExpanded = false;

  app.innerHTML = `
    <!-- Stat cards -->
    <div class="stats-row">
      <div class="stat-card" style="border:1px solid #3b82f644">
        <div class="stat-label">\u{1F3C3} Total Runs</div>
        <div class="stat-value" style="color:#3b82f6">${RUNS.length}</div>
        <div class="stat-sub">${totalDist.toFixed(1)} km total</div>
      </div>
      <div class="stat-card" style="border:1px solid ${streakColor(current)}44">
        <div class="stat-label">\u{1F525} Curr Streak</div>
        <div class="stat-value" style="color:${streakColor(current)}">${current} ${streakEmoji(current)}</div>
        <div class="stat-sub">Best: ${best} days</div>
      </div>
      <div class="stat-card" style="border:1px solid #f59e0b44">
        <div class="stat-label">\u{1F3C6} Total Prize</div>
        <div class="stat-value" style="color:#f59e0b">\u20B9${totalPrize.toLocaleString("en-IN")}</div>
        <div class="stat-sub">Keep running!</div>
      </div>
    </div>

    <!-- Run History -->
    <div>
      <div class="section-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FC4C02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Run History
      </div>
      ${reversed.length === 0 ? `
        <div class="empty-state">
          <div style="font-size:15px">No runs yet!</div>
        </div>
      ` : `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Dist</th><th>Pace</th><th>Time</th><th>Streak</th><th>Prize</th>
              </tr>
            </thead>
            <tbody>
              ${reversed.map(r => {
                const prize = calculatePrize(r.distance, r.streak);
                return `<tr class="data-row">
                  <td style="color:#e5e5e5;font-weight:600">${fmtDate(r.date)} ${r.time}</td>
                  <td style="font-weight:700;color:#fff">${r.distance} km</td>
                  <td style="color:#9ca3af">${r.pace}</td>
                  <td style="color:#9ca3af">${r.duration}</td>
                  <td style="font-weight:700;color:${streakColor(r.streak)}">${r.streak} ${streakEmoji(r.streak)}</td>
                  <td style="font-weight:700;color:${prize > 0 ? '#f59e0b' : '#444'}">${prize > 0 ? '\u20B9' + prize.toLocaleString("en-IN") : '\u2014'}</td>
                </tr>`;
              }).join("")}
            </tbody>
          </table>
        </div>
      `}
    </div>

    <!-- Prize Rules -->
    <div class="rules-panel" id="rulesPanel">
      <button class="rules-toggle" id="rulesToggle">
        <span style="display:flex;align-items:center;gap:8px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
          Prize Rules & Streak Logic
        </span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="rulesChevron">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="rules-body" id="rulesBody" style="display:none">
        <div class="streak-box">
          <div class="streak-box-title">Streak Rules</div>
          <div style="font-size:12px">Run daily to build streak. Miss <strong style="color:#fff">1 day</strong>: streak -1. Miss <strong style="color:#fff">2+ days</strong>: reset to 0.</div>
        </div>
        <table class="prize-table">
          <thead>
            <tr>
              <th style="text-align:left;color:#f59e0b">Distance</th>
              <th style="text-align:center;color:#6b7280">Streak >2</th>
              <th style="text-align:center;color:#6b7280">Streak >5</th>
              <th style="text-align:center;color:#6b7280">Streak >10</th>
            </tr>
          </thead>
          <tbody>
            <tr><td style="font-weight:600;color:#ccc">&lt; 3.5 km</td><td style="text-align:center;color:#444">\u20B90</td><td style="text-align:center;color:#444">\u20B90</td><td style="text-align:center;color:#444">\u20B90</td></tr>
            <tr><td style="font-weight:600;color:#ccc">3.5 \u2013 5 km</td><td style="text-align:center;color:#e5e5e5">\u20B9350</td><td style="text-align:center;color:#e5e5e5">\u20B9500</td><td style="text-align:center;color:#e5e5e5">\u20B9700</td></tr>
            <tr><td style="font-weight:600;color:#ccc">5 \u2013 10 km</td><td style="text-align:center;color:#e5e5e5">\u20B9700</td><td style="text-align:center;color:#e5e5e5">\u20B91,000</td><td style="text-align:center;color:#e5e5e5">\u20B91,400</td></tr>
            <tr><td style="font-weight:600;color:#ccc">&gt; 10 km</td><td style="text-align:center;color:#e5e5e5">\u20B91,050</td><td style="text-align:center;color:#e5e5e5">\u20B91,500</td><td style="text-align:center;color:#e5e5e5">\u20B92,100</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="footer">Running Leaderboard \u2022 Dhananjay S</div>
  `;

  // Rules toggle
  document.getElementById("rulesToggle").addEventListener("click", () => {
    const body = document.getElementById("rulesBody");
    const chevron = document.getElementById("rulesChevron");
    const visible = body.style.display !== "none";
    body.style.display = visible ? "none" : "block";
    chevron.innerHTML = visible
      ? '<polyline points="6 9 12 15 18 9"/>'
      : '<polyline points="18 15 12 9 6 15"/>';
  });
}

render();
</script>
</body>
</html>
